<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a1228">
<title>Wochenbericht · footy.ai</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root{
    --bg0:#080f22; --bg1:#0c1733; --bg2:#102047;
    --card:#131f3d; --card-br:#22335f;
    --blue:#2e7de4; --blue-d:#1659b8; --blue-l:#5b9bf0;
    --txt:#eef2fb; --txt-dim:#9aa8c8; --txt-faint:#6478a0;
    --gold:#f5c542; --silver:#cdd6e6; --bronze:#d98b4a;
    --green:#3ddc84; --amber:#f5a623; --red:#ff5c5c;
    --glow:rgba(46,125,228,.35);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{background:var(--bg0);}
  body{
    font-family:'Barlow',system-ui,sans-serif;
    color:var(--txt);
    min-height:100vh;
    background:
      radial-gradient(900px 500px at 20% -5%, rgba(46,125,228,.22), transparent 70%),
      radial-gradient(700px 400px at 90% 0%, rgba(245,197,66,.10), transparent 65%),
      linear-gradient(180deg, var(--bg1) 0%, var(--bg0) 45%, var(--bg0) 100%);
    background-attachment:fixed;
    line-height:1.5;
    padding:0 0 50px;
    overflow-x:hidden;
  }
  .wrap{max-width:560px;margin:0 auto;padding:0 16px;}

  /* ── Loading / Error states ── */
  .state{
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;gap:14px;
  }
  .spinner{
    width:42px;height:42px;border-radius:50%;
    border:3px solid rgba(255,255,255,.12);border-top-color:var(--blue-l);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .state-emoji{font-size:3rem;}
  .state h2{font-family:'Bebas Neue';font-size:1.7rem;letter-spacing:1px;color:var(--txt);}
  .state p{color:var(--txt-dim);font-size:.92rem;max-width:340px;}

  /* ── Hero ── */
  .hero{
    text-align:center;padding:36px 16px 26px;position:relative;
  }
  .hero::before{
    content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:280px;height:160px;
    background:radial-gradient(ellipse, var(--glow), transparent 70%);
    pointer-events:none;
  }
  .hero-crest{
    width:74px;height:74px;border-radius:50%;object-fit:cover;
    border:2px solid var(--card-br);background:var(--card);
    margin:0 auto 12px;display:block;position:relative;
    box-shadow:0 6px 24px rgba(0,0,0,.4);
  }
  .hero-crest-fallback{
    width:74px;height:74px;border-radius:50%;
    background:linear-gradient(135deg,var(--blue),var(--blue-d));
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue';font-size:2rem;color:#fff;
    margin:0 auto 12px;position:relative;
    box-shadow:0 6px 24px rgba(0,0,0,.4);
  }
  .hero-club{
    font-size:.78rem;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--txt-dim);font-weight:700;position:relative;
  }
  .hero-title{
    font-family:'Bebas Neue';font-size:2.9rem;line-height:.95;
    letter-spacing:1.5px;margin:6px 0 2px;position:relative;
    background:linear-gradient(180deg,#ffffff 30%,#b9ccf0);
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .hero-team{
    display:inline-flex;align-items:center;gap:8px;position:relative;
    font-family:'Barlow Condensed';font-weight:700;font-size:1.15rem;
    color:var(--blue-l);letter-spacing:.5px;text-transform:uppercase;
    margin-top:2px;
  }
  .hero-week{
    position:relative;margin-top:14px;display:inline-block;
    padding:7px 18px;border-radius:999px;
    background:rgba(46,125,228,.14);border:1px solid rgba(46,125,228,.35);
    font-weight:700;font-size:.86rem;color:var(--txt);
  }
  .hero-week b{font-family:'Bebas Neue';font-size:1.05rem;letter-spacing:1px;margin-right:5px;color:var(--blue-l);}
  .hero-dates{position:relative;margin-top:7px;font-size:.8rem;color:var(--txt-faint);}

  /* ── Section ── */
  .sec{margin-top:26px;}
  .sec-head{
    display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:0 2px;
  }
  .sec-head h2{
    font-family:'Bebas Neue';font-size:1.5rem;letter-spacing:1px;color:var(--txt);
  }
  .sec-head .sec-line{
    flex:1;height:1px;background:linear-gradient(90deg,var(--card-br),transparent);
  }

  /* ── Week sessions strip ── */
  .week-card{
    background:var(--card);border:1px solid var(--card-br);border-radius:16px;
    padding:16px;
  }
  .sess-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
  .sess-row{
    display:flex;align-items:center;gap:10px;
    padding:9px 12px;border-radius:10px;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);
  }
  .sess-ico{font-size:1.1rem;}
  .sess-date{font-weight:700;font-size:.9rem;}
  .sess-type{
    font-size:.7rem;text-transform:uppercase;letter-spacing:1px;
    color:var(--txt-dim);font-weight:700;
  }
  .sess-label{margin-left:auto;font-size:.82rem;color:var(--txt-dim);font-style:italic;}
  .week-team-stat{
    display:flex;align-items:center;justify-content:space-between;
    padding-top:14px;border-top:1px solid var(--card-br);
  }
  .week-team-stat .lbl{font-size:.82rem;color:var(--txt-dim);font-weight:600;}
  .week-team-stat .val{font-family:'Bebas Neue';font-size:2rem;letter-spacing:1px;}

  /* ── Ranking ── */
  .rank-list{display:flex;flex-direction:column;gap:8px;}
  .rank-row{
    display:flex;align-items:center;gap:12px;
    background:var(--card);border:1px solid var(--card-br);
    border-radius:14px;padding:11px 13px;
    opacity:0;transform:translateY(14px);
    animation:rise .5s cubic-bezier(.2,.7,.3,1) forwards;
  }
  @keyframes rise{to{opacity:1;transform:translateY(0);}}
  .rank-num{
    flex-shrink:0;width:30px;text-align:center;
    font-family:'Bebas Neue';font-size:1.5rem;color:var(--txt-faint);letter-spacing:.5px;
  }
  .rank-row.top1{
    border-color:rgba(245,197,66,.5);
    background:linear-gradient(100deg,rgba(245,197,66,.12),var(--card) 55%);
    box-shadow:0 4px 22px rgba(245,197,66,.13);
  }
  .rank-row.top2{
    border-color:rgba(205,214,230,.42);
    background:linear-gradient(100deg,rgba(205,214,230,.10),var(--card) 55%);
  }
  .rank-row.top3{
    border-color:rgba(217,139,74,.42);
    background:linear-gradient(100deg,rgba(217,139,74,.10),var(--card) 55%);
  }
  .rank-row.top1 .rank-num{color:var(--gold);}
  .rank-row.top2 .rank-num{color:var(--silver);}
  .rank-row.top3 .rank-num{color:var(--bronze);}
  .rank-medal{font-size:1.3rem;line-height:1;}

  .avatar{
    flex-shrink:0;width:46px;height:46px;border-radius:50%;
    object-fit:cover;border:2px solid var(--card-br);background:var(--bg2);
  }
  .avatar-ph{
    flex-shrink:0;width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue';font-size:1.25rem;color:#fff;letter-spacing:.5px;
    border:2px solid rgba(255,255,255,.1);
  }
  .rank-info{flex:1;min-width:0;}
  .rank-name{
    font-weight:700;font-size:.97rem;color:var(--txt);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .rank-meta{
    display:flex;align-items:center;gap:7px;margin-top:2px;
    font-size:.72rem;color:var(--txt-faint);
  }
  .rank-nr{
    font-family:'Barlow Condensed';font-weight:700;
    color:var(--blue-l);
  }
  .rank-pos{
    background:rgba(255,255,255,.06);padding:1px 6px;border-radius:4px;
    font-weight:700;letter-spacing:.5px;
  }
  .rank-cells{display:flex;gap:2px;font-size:.82rem;margin-top:3px;}
  .rank-pct{
    flex-shrink:0;text-align:right;min-width:58px;
  }
  .rank-pct .num{
    font-family:'Bebas Neue';font-size:2rem;line-height:.9;letter-spacing:.5px;
  }
  .rank-pct .sub{font-size:.66rem;color:var(--txt-faint);font-weight:600;margin-top:1px;}
  .pct-hi{color:var(--green);}
  .pct-mid{color:var(--blue-l);}
  .pct-lo{color:var(--amber);}
  .pct-zero{color:var(--txt-faint);}

  /* ── Team totals ── */
  .team-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;
  }
  .team-stat{
    background:var(--card);border:1px solid var(--card-br);
    border-radius:14px;padding:14px;text-align:center;
  }
  .team-stat .ts-val{
    font-family:'Bebas Neue';font-size:2.4rem;line-height:.9;letter-spacing:1px;
  }
  .team-stat .ts-lbl{
    font-size:.72rem;color:var(--txt-dim);font-weight:700;
    text-transform:uppercase;letter-spacing:1px;margin-top:5px;
  }
  .team-stat.wide{grid-column:1 / -1;}

  /* ── Legend ── */
  .legend{
    display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;
    margin-top:14px;font-size:.74rem;color:var(--txt-dim);
  }
  .legend span{display:inline-flex;align-items:center;gap:4px;}

  /* ── Footer ── */
  .footer{
    text-align:center;margin-top:36px;padding-top:22px;
    border-top:1px solid var(--card-br);
  }
  .footer-brand{
    font-family:'Bebas Neue';font-size:1.25rem;letter-spacing:1.5px;
    color:var(--txt-dim);
  }
  .footer-brand b{color:var(--blue-l);}
  .footer-meta{font-size:.72rem;color:var(--txt-faint);margin-top:5px;}

  .fade-seq{opacity:0;animation:fadeUp .55s ease forwards;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="app">
  <!-- Loading -->
  <div class="state" id="state-loading">
    <div class="spinner"></div>
    <p>Bericht wird geladen…</p>
  </div>
</div>

<script>
const FB_CONFIG={
  apiKey:'AIzaSyANvxDo9idsZSq7syZwmCHDvbVguIjKtsY',
  databaseURL:'https://fc-frohlinde-ea23f-default-rtdb.europe-west1.firebasedatabase.app',
  projectId:'fc-frohlinde-ea23f',
  appId:'1:765150260941:web:42da53f86f8bbcbed8c384',
  authDomain:'fc-frohlinde-ea23f.firebaseapp.com'
};

// ── Utilities ──
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function getParam(name){return new URLSearchParams(location.search).get(name);}
function initials(name){
  const parts=String(name||'').trim().split(/\s+/).filter(Boolean);
  if(!parts.length)return '?';
  if(parts.length===1)return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0]+parts[parts.length-1][0]).toUpperCase();
}
function avatarColor(name){
  let h=0;const s=String(name||'');
  for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))|0;
  const hue=Math.abs(h)%360;
  return `linear-gradient(135deg,hsl(${hue},58%,46%),hsl(${(hue+40)%360},60%,34%))`;
}
function pctClass(p){
  if(p==null)return 'pct-zero';
  if(p>=80)return 'pct-hi';
  if(p>=50)return 'pct-mid';
  if(p>0)return 'pct-lo';
  return 'pct-zero';
}
const CELL_EMOJI={1:'\u2705',0:'\u274c',2:'\ud83d\udfe1',3:'\u2796'};
function cellEmoji(v){return CELL_EMOJI[v]!=null?CELL_EMOJI[v]:'\u2796';}

function showError(emoji,title,msg){
  document.getElementById('app').innerHTML=
    `<div class="state"><div class="state-emoji">${emoji}</div>`+
    `<h2>${esc(title)}</h2><p>${esc(msg)}</p></div>`;
}

// ── Render ──
function renderReport(r){
  const app=document.getElementById('app');
  // Avatar helper
  const av=p=>{
    if(p.photo)return `<img class="avatar" src="${esc(p.photo)}" alt="">`;
    return `<div class="avatar-ph" style="background:${avatarColor(p.name)}">${esc(initials(p.name))}</div>`;
  };
  // Ranking row builder
  const rankRow=(p,idx,pctField,subText,showCells)=>{
    const rank=idx+1;
    const topCls=rank<=3?` top${rank}`:'';
    const medal=['\ud83e\udd47','\ud83e\udd48','\ud83e\udd49'][idx]||'';
    const pct=p[pctField];
    const cellsHtml=showCells&&p.wCells&&p.wCells.length
      ? `<div class="rank-cells">${p.wCells.map(cellEmoji).join('')}</div>` : '';
    const numOrMedal=rank<=3
      ? `<div class="rank-num"><span class="rank-medal">${medal}</span></div>`
      : `<div class="rank-num">${rank}</div>`;
    return `<div class="rank-row${topCls}" style="animation-delay:${Math.min(idx*55,900)}ms">
      ${numOrMedal}
      ${av(p)}
      <div class="rank-info">
        <div class="rank-name">${esc(p.name)}</div>
        <div class="rank-meta">
          ${p.nr?`<span class="rank-nr">#${esc(p.nr)}</span>`:''}
          ${p.pos?`<span class="rank-pos">${esc(p.pos)}</span>`:''}
        </div>
        ${cellsHtml}
      </div>
      <div class="rank-pct">
        <div class="num ${pctClass(pct)}">${pct==null?'\u2013':pct+'%'}</div>
        <div class="sub">${esc(subText(p))}</div>
      </div>
    </div>`;
  };

  // Sort copies
  const weekRanked=[...r.players].sort((a,b)=>
    (b.wPct==null?-1:b.wPct)-(a.wPct==null?-1:a.wPct)
    || b.wPresent-a.wPresent || (a.nr||99)-(b.nr||99));
  const seasonRanked=[...r.players].sort((a,b)=>
    (b.sPct==null?-1:b.sPct)-(a.sPct==null?-1:a.sPct)
    || b.sPresent-a.sPresent || (a.nr||99)-(b.nr||99));

  const ts=r.teamStats||{};
  const wk=r.week||{};
  const crest=r.clubLogo
    ? `<img class="hero-crest" src="${esc(r.clubLogo)}" alt="">`
    : `<div class="hero-crest-fallback">${esc(initials(r.club||'FC'))}</div>`;

  // Sessions strip
  const sessHtml=(wk.sessions||[]).map(s=>{
    const isMatch=s.type==='match';
    return `<div class="sess-row">
      <span class="sess-ico">${isMatch?'\u26bd':'\ud83c\udfc3'}</span>
      <span class="sess-date">${esc(s.date)}</span>
      <span class="sess-type">${isMatch?'Spiel':'Training'}</span>
      ${s.label?`<span class="sess-label">${esc(s.label)}</span>`:''}
    </div>`;
  }).join('');

  let html=`
  <div class="hero">
    ${crest}
    <div class="hero-club">${esc(r.club||'')}</div>
    <div class="hero-title">Wochenbericht</div>
    <div class="hero-team">${esc(r.team||'')} <span style="opacity:.5">·</span> ${esc(r.season||'')}</div>
    <div><span class="hero-week"><b>KW ${esc(wk.kw||'?')}</b></span></div>
    <div class="hero-dates">${esc(wk.from||'')} \u2013 ${esc(wk.to||'')}</div>
  </div>
  <div class="wrap">`;

  // Diese Woche
  if((wk.sessions||[]).length){
    html+=`<div class="sec fade-seq" style="animation-delay:.05s">
      <div class="sec-head"><h2>\ud83d\udcc5 Diese Woche</h2><div class="sec-line"></div></div>
      <div class="week-card">
        <div class="sess-list">${sessHtml}</div>
        <div class="week-team-stat">
          <span class="lbl">Teilnahme der Mannschaft</span>
          <span class="val ${pctClass(ts.weekPct)}">${ts.weekPct==null?'\u2013':ts.weekPct+'%'}</span>
        </div>
      </div>
    </div>`;
  }

  // Rangliste der Woche
  html+=`<div class="sec fade-seq" style="animation-delay:.1s">
    <div class="sec-head"><h2>\ud83c\udfc6 Rangliste der Woche</h2><div class="sec-line"></div></div>
    <div class="rank-list">
      ${weekRanked.map((p,i)=>rankRow(p,i,'wPct',
        pp=>pp.wTotal?`${pp.wPresent}/${pp.wTotal}`:'\u2013',true)).join('')}
    </div>
    <div class="legend">
      <span>\u2705 da</span><span>\ud83d\udfe1 entschuldigt</span>
      <span>\u274c gefehlt</span><span>\u2796 offen</span>
    </div>
  </div>`;

  // Saison-Wertung
  html+=`<div class="sec fade-seq" style="animation-delay:.15s">
    <div class="sec-head"><h2>\ud83d\udcca Saison-Wertung</h2><div class="sec-line"></div></div>
    <p style="font-size:.8rem;color:var(--txt-dim);margin-bottom:12px;padding:0 2px;">
      Gesamte Anwesenheit diese Saison \u2014 hier z\u00e4hlt jede Woche!
    </p>
    <div class="rank-list">
      ${seasonRanked.map((p,i)=>rankRow(p,i,'sPct',
        pp=>pp.sTotal?`${pp.sPresent}/${pp.sTotal}`:'\u2013',false)).join('')}
    </div>
  </div>`;

  // Mannschaft
  html+=`<div class="sec fade-seq" style="animation-delay:.2s">
    <div class="sec-head"><h2>\u26bd Mannschaft</h2><div class="sec-line"></div></div>
    <div class="team-grid">`;
  if(ts.weekTrainCount){
    html+=`<div class="team-stat">
      <div class="ts-val ${pctClass(ts.weekPct)}">${ts.trainingAvg==null?'\u2013':'\u2300 '+ts.trainingAvg}</div>
      <div class="ts-lbl">\u00d8 Training (${ts.weekTrainCount}\u00d7)</div>
    </div>`;
  }
  if(ts.weekMatchCount){
    html+=`<div class="team-stat">
      <div class="ts-val ${pctClass(ts.weekPct)}">${ts.matchAvg==null?'\u2013':ts.matchAvg}</div>
      <div class="ts-lbl">\u00d8 Spiel (${ts.weekMatchCount}\u00d7)</div>
    </div>`;
  }
  html+=`<div class="team-stat wide">
      <div class="ts-val ${pctClass(ts.seasonPct)}">${ts.seasonPct==null?'\u2013':ts.seasonPct+'%'}</div>
      <div class="ts-lbl">Saison-Teilnahme gesamt \u00b7 ${esc(ts.rosterSize||'?')} Spieler</div>
    </div>`;
  html+=`</div></div>`;

  // Footer
  const pubDate=r.publishedAt?new Date(r.publishedAt):null;
  const pubStr=pubDate
    ? pubDate.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})
      +' '+pubDate.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})
    : '';
  html+=`<div class="footer">
    <div class="footer-brand">erstellt mit <b>footy.ai</b></div>
    ${pubStr?`<div class="footer-meta">Stand: ${esc(pubStr)}</div>`:''}
  </div>`;

  html+=`</div>`; // .wrap
  app.innerHTML=html;
}

// ── Load ──
(function(){
  const id=getParam('id');
  if(!id){
    showError('\ud83d\udd17','Kein Bericht angegeben',
      'Dieser Link ist unvollst\u00e4ndig. Bitte verwende den vollst\u00e4ndigen Link aus der Team-Gruppe.');
    return;
  }
  if(!/^[A-Za-z0-9_-]{4,64}$/.test(id)){
    showError('\u26a0\ufe0f','Ung\u00fcltiger Link',
      'Der Bericht-Code in diesem Link ist ung\u00fcltig.');
    return;
  }
  let app;
  try{
    app=firebase.initializeApp(FB_CONFIG,'report');
  }catch(e){
    showError('\u26a0\ufe0f','Fehler','Die Verbindung konnte nicht hergestellt werden.');
    return;
  }
  const db=firebase.database(app);
  // safety timeout
  let settled=false;
  const to=setTimeout(()=>{
    if(settled)return;settled=true;
    showError('\ud83d\udd04','Zeit\u00fcberschreitung',
      'Der Bericht konnte nicht geladen werden. Pr\u00fcfe deine Internetverbindung und lade die Seite neu.');
  },12000);
  db.ref('publishedReports/'+id).get().then(snap=>{
    if(settled)return;settled=true;clearTimeout(to);
    if(!snap.exists()){
      showError('\ud83d\udd0d','Bericht nicht gefunden',
        'Dieser Bericht existiert nicht (mehr). M\u00f6glicherweise wurde er entfernt oder der Link ist veraltet.');
      return;
    }
    const data=snap.val();
    if(!data||!data.players||!Array.isArray(data.players)){
      showError('\u26a0\ufe0f','Bericht besch\u00e4digt',
        'Die Bericht-Daten konnten nicht gelesen werden.');
      return;
    }
    try{renderReport(data);}
    catch(e){
      showError('\u26a0\ufe0f','Anzeigefehler','Der Bericht konnte nicht dargestellt werden.');
    }
  }).catch(err=>{
    if(settled)return;settled=true;clearTimeout(to);
    showError('\ud83d\udce1','Verbindungsfehler',
      'Der Bericht konnte nicht geladen werden. Bitte sp\u00e4ter erneut versuchen.');
  });
})();
</script>
</body>
